{% extends 'base.html' %}
{% block content %}

<div class="mx-auto mt-5" style="max-width: 500px;">
    <div class="card border-0 shadow-sm rounded-4 p-5 bg-white text-center">
        
        <div class="mb-4">
            <div class="bg-light text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px;">
                <i class="fa-regular fa-envelope fs-2 text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark">კონტაქტი</h2>
            <p class="text-muted">გაქვთ კითხვები? დაგვიკავშირდით ნებისმიერ დროს!</p>
        </div>
        
        <hr class="my-4 text-muted opacity-25">

        <div class="text-start mx-auto" style="max-width: 350px;">
            <div class="d-flex align-items-center mb-3">
                <div class="text-primary me-3 fs-5" style="width: 25px;"><i class="fa-regular fa-envelope-open"></i></div>
                <div>
                    <small class="text-muted d-block" style="font-size: 11px; text-transform: uppercase; font-weight: 700;">ელ-ფოსტა</small>
                    <a href="mailto:info@company.com" class="text-decoration-none text-dark fw-medium">info@company.com</a>
                </div>
            </div>

            <div class="d-flex align-items-center mb-3">
                <div class="text-primary me-3 fs-5" style="width: 25px;"><i class="fa-solid fa-mobile-screen-button"></i></div>
                <div>
                    <small class="text-muted d-block" style="font-size: 11px; text-transform: uppercase; font-weight: 700;">ტელეფონი</small>
                    <span class="text-dark fw-medium">+1 (123) 456-7890</span>
                </div>
            </div>

            <div class="d-flex align-items-center mb-4">
                <div class="text-primary me-3 fs-5" style="width: 25px;"><i class="fa-solid fa-location-dot"></i></div>
                <div>
                    <small class="text-muted d-block" style="font-size: 11px; text-transform: uppercase; font-weight: 700;">მისამართი</small>
                    <span class="text-dark fw-medium">123 Main Street, Anytown, USA</span>
                </div>
            </div>
        </div>

        <div class="mt-2">
            <a href="{% url 'home' %}" class="btn btn-outline-primary rounded-pill px-4 fw-bold">
                <i class="fa-solid fa-arrow-left me-1"></i> მთავარზე დაბრუნება
            </a>
        </div>

    </div>
</div>

{% endblock content %}
