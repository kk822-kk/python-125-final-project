{% extends 'base.html' %}
{% block content %}

<div class="mx-auto mt-5 shadow-sm" style="max-width: 450px; background-color: #ffffff; border-radius: 20px; overflow: hidden;">
    
    <div class="text-center py-4 text-white" style="background-color: #2b1b3d;">
        <h3 class="fw-bold mb-1"><i class="fa-solid fa-right-to-bracket me-2"></i>შესვლა</h3>
        <p class="mb-0" style="color: #ccbccc !important; font-size: 14px;">სისტემაში ავტორიზაცია</p>
    </div>

    <div class="p-4 px-5">
        {% if form.errors %}
            <div class="alert alert-danger rounded-3 p-2 small mb-3">
                <i class="fa-solid fa-triangle-exclamation me-1"></i> მომხმარებლის სახელი ან პაროლი არასწორია.
            </div>
        {% endif %}

        <form method="POST" class="custom-login-form">
            {% csrf_token %}
            
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold fs-6 mt-2 shadow-sm">
                შესვლა
            </button>
        </form>
        
        <hr class="my-4 text-muted opacity-25">

        <p class="text-center mb-1 text-secondary" style="font-size: 14.5px;">
            ახალი ხართ საიტზე? 
            <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color: #2b1b3d;">რეგისტრაცია</a>
        </p>
    </div>
</div>

<style>
    .custom-login-form p {
        margin-bottom: 15px !important;
    }
    .custom-login-form label {
        font-weight: 600;
        font-size: 13.5px;
        color: #495057;
        margin-bottom: 5px;
        display: block;
    }
    .custom-login-form input[type="text"], 
    .custom-login-form input[type="password"] {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #dee2e6;
        border-radius: 20px;
        background-color: #f8f9fa;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }
    .custom-login-form input:focus {
        border-color: #2b1b3d;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(43, 27, 61, 0.1);
    }
    .custom-login-form .errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 5px 0;
        color: #dc3545;
        font-size: 12px;
        font-weight: bold;
    }
</style>

{% endblock %}ს
