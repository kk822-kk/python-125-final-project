{% extends 'base.html' %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>პოსტები</title>
</head>
<body>

    {% for post in posts %}
      <div class="post">
        <h2>{{ post.title }}</a></h2>
        <p>{{ post.content }}</p>
        <small>{{ post.created_at|date:"d M Y" }}</small>
      </div>
    {% empty %}
      <p>პოსტები არ არის.</p>
    {% endfor %}

</body>
</html>
{% endblock content %}
